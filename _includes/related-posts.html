{% assign related = site.posts | where_exp: "post", "post.url != page.url" | limit: 3 %}
{% if related.size > 0 %}
<section class="related-posts">
  <div class="container">
    <h2>Keep reading</h2>
    <div class="post-grid">
      {% for post in related %}
      <article class="post-card">
        {% if post.image %}
        <a href="{{ post.url | prepend: site.baseurl }}">
          <img src="{{ post.image | prepend: site.baseurl }}" alt="{{ post.title }}" class="post-card-image" loading="lazy" />
        </a>
        {% endif %}
        <div class="post-card-body">
          <h3 class="post-card-title">
            <a href="{{ post.url | prepend: site.baseurl }}">{{ post.title }}</a>
          </h3>
          <p class="post-card-excerpt">{{ post.excerpt | strip_html | truncate: 100 }}</p>
        </div>
      </article>
      {% endfor %}
    </div>
  </div>
</section>
{% endif %}
