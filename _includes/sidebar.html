<div class="sidebar-widget">
  <h3>Recent guides</h3>
  <ul class="sidebar-post-list">
    {% for post in site.posts limit:5 %}
    <li><a href="{{ post.url | relative_url }}">{{ post.title }}</a></li>
    {% endfor %}
  </ul>
</div>

<div class="sidebar-widget sidebar-cta">
  <h3>Free weekly meal plan</h3>
  <p>Budget-friendly, takes under 2 hours to prep. Every week, free.</p>
  <form class="sidebar-form" action="#" method="post">
    <input type="email" name="email" placeholder="your@email.com" required />
    <button type="submit">Send it to me</button>
  </form>
</div>

<div class="sidebar-widget">
  <h3>Browse by topic</h3>
  <div class="tag-cloud">
    <a href="{{ '/meal-prep/' | relative_url }}" class="tag">Meal prep</a>
    <a href="{{ '/budget-tips/' | relative_url }}" class="tag">Budget tips</a>
    <a href="{{ '/reviews/' | relative_url }}" class="tag">Reviews</a>
  </div>
</div>
