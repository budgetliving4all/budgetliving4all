title: Budget Meal Prep
description: Practical meal prep guides and budget cooking tips to eat well for less.

# IMPORTANT: Set url to your GitHub Pages URL until you have a custom domain
# If using github.io: url: "https://YOUR-USERNAME.github.io"
# If using custom domain: url: "https://budgetmealprep.com"
url: "https://YOUR-USERNAME.github.io"

# IMPORTANT: Set baseurl to your repo name (with leading slash)
# e.g. if repo is named "budgetmealprep": baseurl: "/budgetmealprep"
# If using a custom domain OR repo named exactly "YOUR-USERNAME.github.io": baseurl: ""
baseurl: "/budgetmealprep"

author:
  name: Budget Meal Prep
  email: hello@budgetmealprep.com

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:categories/:title/

# Plugins (all supported by GitHub Pages)
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Pagination
paginate: 10
paginate_path: "/page/:num/"

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Budget Meal Prep"
