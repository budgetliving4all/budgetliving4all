title: Budget Living 4 All
tagline: Real strategies for spending less and living well.
description: Practical guides on meal prep, frugal living, budget tips, and making the most of every dollar.

url: "https://budgetliving4all.github.io"
baseurl: "/budgetliving4all"

author:
  name: Budget Living 4 All
  email: budgetliving4all@gmail.com

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:categories/:title/

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Budget Living 4 All"
      image: "/assets/images/default-og.jpg"

# Site sections — add new ones here as you grow
sections:
  - name: Meal Prep
    path: /meal-prep/
    description: Batch cooking guides that actually fit a real schedule and budget.
  - name: Budget Tips
    path: /budget-tips/
    description: Grocery, household, and everyday spending strategies.
  - name: Reviews
    path: /reviews/
    description: Honest takes on kitchen gear and tools worth buying.
