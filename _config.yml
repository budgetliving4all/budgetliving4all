title: Budget Living 4 All
tagline: Real strategies for spending less and living well.
description: Practical guides on meal prep, grocery budgets, and everyday frugal living. Real strategies, verified sources, no fluff.

url: "https://budgetliving4all.github.io"
baseurl: "/budgetliving4all"

author:
  name: Budget Living 4 All
  email: budgetliving4all@gmail.com

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:categories/:title/
excerpt_separator: "<!--more-->"

# SEO
lang: en_US
twitter:
  card: summary_large_image

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - WRITING-GUIDE.md
  - PRODUCT-STANDARDS.md
  - node_modules

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Budget Living 4 All"

sections:
  - name: Meal Prep
    path: /meal-prep/
  - name: Budget Tips
    path: /budget-tips/
  - name: Reviews
    path: /reviews/
